<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>FIFA World Cup 2026 – Score Editor (Modular)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    /* Thin scrollbars – visible */
    * { scrollbar-width: thin; scrollbar-color: #4f46e5 #1f2937; }
    *::-webkit-scrollbar { width: 8px; height: 8px; }
    *::-webkit-scrollbar-track { background: #1f2937; border-radius: 10px; }
    *::-webkit-scrollbar-thumb { background: #4f46e5; border-radius: 10px; }
    .tab-btn { transition: all 0.1s ease; -webkit-tap-highlight-color: transparent; }
    .tab-btn:active { transform: scale(0.96); }
    .team-name-clickable { cursor: pointer; }
    .team-name-clickable:hover { color: #818cf8; text-decoration: underline; }
    .match-card-clickable { cursor: pointer; }
    .match-card-clickable:active { transform: scale(0.98); }
    .loading-spinner {
      border: 2px solid #e2e8f0;
      border-top-color: #6366f1;
      border-radius: 50%;
      width: 32px;
      height: 32px;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
  </style>
<style>
::-webkit-scrollbar { display: none; }
* { scrollbar-width: none; -ms-overflow-style: none; }
#mainContent {
  position: relative;
  transition: opacity 0.35s ease, transform 0.35s ease;
  opacity: 1;
  transform: scale(1) translateY(0);
}
#mainContent.fade-out {
  opacity: 0;
  transform: scale(0.97) translateY(6px);
}
.loading-spinner {
  border: 2px solid #e2e8f0;
  border-top-color: #6366f1;
  border-radius: 50%;
  width: 32px;
  height: 32px;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
img.team-logo{
border:0.5px solid gray;
border-radius:50%;
}
.tab-btn.active {
  border-bottom-color: #6366f1;
  color: #ffffff;
}
.tab-btn {
  border-bottom: 2px solid transparent;
  color: rgba(255,255,255,0.5);
}
</style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans antialiased h-screen overflow-hidden flex flex-col">

<div id="app" class="flex-1 flex flex-col min-h-0 pb-50">
  <!-- Header and tabs will be injected by JS -->
</div>

<footer class="fixed bottom-0 left-0 right-0 bg-gradient-to-r from-indigo-800 via-purple-800 to-indigo-900 shadow-2xl border-t border-white/10 text-[10px] text-white/80 px-2 flex items-center justify-between flex-nowrap">
  <div id="dbStatus" class="flex items-center gap-1 text-xs text-white/60 truncate">
    <i id="dbStatusIcon" class="fas fa-database"></i>
    <span id="dbStatusSpan">Loading...</span>
  </div>
  <div class="flex flex-1 flex-nowrap items-center justify-around gap-1">
    <button id="fifaExportBtn" class="min-h-[44px] min-w-[44px] bg-white/10 hover:bg-white/20 rounded-full text-xs px-2 py-1.5 flex items-center gap-1">
      <i class="fas fa-file-export"></i><span>Export</span>
    </button>
    <button id="fifaImportBtn" class="min-h-[44px] min-w-[44px] bg-white/10 hover:bg-white/20 rounded-full text-xs px-2 py-1.5 flex items-center gap-1">
      <i class="fas fa-file-import"></i><span>Import</span>
    </button>
    <button id="compareTeamsBtn" class="min-h-[44px] min-w-[44px] bg-white/10 hover:bg-white/20 rounded-full text-xs px-2 py-1.5 flex items-center gap-1">
      <i class="fas fa-people-arrows"></i><span>Compare</span>
    </button>
    <button id="resetStorageBtn" class="min-h-[44px] min-w-[44px] bg-red-500/30 hover:bg-red-500/40 rounded-full text-xs px-2 py-1.5 flex items-center gap-1">
      <i class="fas fa-trash-alt"></i><span>Reset</span>
    </button>
  </div>
</footer>

<!-- Modals (static) -->
<div id="teamModal" class="fixed inset-0 z-50 hidden items-center justify-center p-4 bg-black/70 backdrop-blur-md">
  <div class="bg-gray-900 border border-white/10 rounded-2xl max-w-2xl w-full max-h-[90dvh] flex flex-col">
    <div class="flex justify-between items-center p-4 border-b border-white/10">
      <h3 id="teamModalTitle" class="text-lg font-bold text-white">Team Details</h3>
      <button class="close-modal text-white/50 hover:text-white transition min-w-[44px] min-h-[44px]"><i class="fas fa-times text-xl"></i></button>
    </div>
    <div id="teamModalBody" class="p-4 overflow-auto text-white/80"></div>
  </div>
</div>
<div id="matchModal" class="fixed inset-0 z-50 hidden items-center justify-center p-1 bg-black/70 backdrop-blur-md">
  <div class="bg-gray-900 border border-white/10 rounded-2xl max-w-2xl w-full max-h-[90dvh] flex flex-col">
    <div class="flex justify-between items-center px-4 py-0 border-b border-white/10">
      <h3 id="matchModalTitle" class="text-lg font-bold text-white">Match Details</h3>
      <button class="close-modal text-white/50 hover:text-white transition min-w-[44px] min-h-[44px]"><i class="fas fa-times text-xl"></i></button>
    </div>
    <div id="matchModalBody" class="p-4 overflow-auto text-white/80"></div>
  </div>
</div>
<div id="h2hModal" class="fixed inset-0 z-50 hidden items-center justify-center p-4 bg-black/70 backdrop-blur-md">
  <div class="bg-gray-900 border border-white/10 rounded-2xl max-w-md w-full max-h-[90dvh] flex flex-col">
    <div class="flex justify-between items-center p-4 border-b border-white/10">
      <h3 class="text-lg font-bold text-white"><i class="fas fa-people-arrows mr-2"></i>Head to Head</h3>
      <button class="close-modal text-white/50 hover:text-white transition"><i class="fas fa-times text-xl"></i></button>
    </div>
    <div class="p-4 text-white/80">
      <select id="team1Select" class="bg-gray-800 border border-white/10 rounded p-2 w-full mb-2"></select>
      <select id="team2Select" class="bg-gray-800 border border-white/10 rounded p-2 w-full mb-2"></select>
      <button id="compareBtn" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded w-full">Compare</button>
      <div id="h2hResult" class="mt-4"></div>
    </div>
  </div>
</div>
<div id="fifaExportModal" class="fixed inset-0 z-50 hidden flex items-center justify-center bg-black/70 backdrop-blur-md">
  <div class="bg-gray-900 border border-white/10 rounded-2xl w-full max-w-3xl mx-4 max-h-[90dvh] flex flex-col">
    <div class="flex justify-between items-center p-4 border-b border-white/10">
      <h3 class="text-lg font-bold text-white"><i class="fas fa-file-export mr-2"></i>Export Data</h3>
      <button class="close-modal text-white/50 hover:text-white transition"><i class="fas fa-times text-xl"></i></button>
    </div>
    <div id="fifaExportModalBody" class="p-4 overflow-y-auto flex-1 space-y-6 text-white/80"></div>
  </div>
</div>
<div id="fifaImportModal" class="fixed inset-0 z-50 hidden flex items-center justify-center bg-black/70 backdrop-blur-md">
  <div class="bg-gray-900 border border-white/10 rounded-2xl w-full max-w-3xl mx-4 max-h-[90dvh] flex flex-col">
    <div class="flex justify-between items-center p-4 border-b border-white/10">
      <h3 class="text-lg font-bold text-white"><i class="fas fa-file-import mr-2"></i>Import Data (JSON)</h3>
      <button class="close-modal text-white/50 hover:text-white transition"><i class="fas fa-times text-xl"></i></button>
    </div>
    <div id="fifaImportModalBody" class="p-4 overflow-y-auto flex-1 space-y-6 text-white/80"></div>
  </div>
</div>
<div id="customDialogOverlay" class="fixed inset-0 z-[60] flex items-center justify-center bg-black/70 backdrop-blur-md hidden">
  <div class="bg-gray-900 border border-white/10 rounded-2xl max-w-sm w-full mx-2 overflow-hidden">
    <div class="p-4 border-b border-white/10"><h3 id="customDialogTitle" class="text-lg font-bold text-white">Alert</h3></div>
    <div id="customDialogMessage" class="p-4 text-sm text-white/80"></div>
    <div id="customDialogButtons" class="p-4 border-t border-white/10 bg-gray-800 flex justify-end gap-2"></div>
  </div>
</div>

<!-- Login Modal -->
<div id="loginModal" class="fixed inset-0 z-[70] hidden items-center justify-center p-4 bg-black/70 backdrop-blur-md">
  <div class="bg-gray-900 border border-white/10 rounded-2xl max-w-sm w-full mx-2 overflow-hidden">
    <div class="p-6">
      <h3 class="text-lg font-bold text-white mb-2">
        <i class="fas fa-lock mr-2"></i>Server Password
      </h3>
      <p class="text-sm text-white/60 mb-4">Enter the password to access the FIFA database.</p>
      <input id="loginPasswordInput" type="password" placeholder="Password" class="w-full bg-gray-800 border border-white/10 rounded px-3 py-2 text-white mb-4 focus:outline-none focus:border-indigo-500">
      <div class="flex justify-end gap-2">
        <button id="loginCancelBtn" class="px-4 py-2 text-sm text-white/50 hover:text-white transition">Cancel</button>
        <button id="loginSubmitBtn" class="px-4 py-2 text-sm bg-indigo-600 hover:bg-indigo-700 text-white rounded transition">Login</button>
      </div>
      <p id="loginError" class="text-red-400 text-xs mt-2 hidden"></p>
    </div>
  </div>
</div>
<!-- NEW: Remote SQL library -->
<script src="jaferRemoteSQL.js"></script>
<script type="module" src="./app.js"></script>
</body>
</html>
